<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>First-Order ODE Simulator</title>
<style>
  :root{
    --bg: #0B0F14;
    --panel: #11161D;
    --panel-raised: #161D26;
    --grid: #1C2530;
    --grid-major: #2A3542;
    --text: #E6EDF3;
    --muted: #7C8896;
    --amber: #FFB020;
    --amber-dim: #7A5A18;
    --cyan: #4FD8E8;
    --cyan-dim: #1F5158;
    --red: #FF6B6B;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: radial-gradient(ellipse at top, #121821 0%, var(--bg) 55%);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 24px;
  }
  .wrap { max-width: 1180px; margin: 0 auto; }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 18px;
    border-bottom: 1px solid var(--grid-major);
    padding-bottom: 14px;
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.02em;
    margin: 0;
  }
  header h1 span { color: var(--amber); }
  header .eqn {
    font-family: var(--mono);
    color: var(--muted);
    font-size: 13px;
  }

  .layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 18px;
  }
  @media (max-width: 860px) {
    .layout { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--grid-major);
    border-radius: 6px;
    padding: 16px;
  }

  .field { margin-bottom: 16px; }
  .field label {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .field label .val { color: var(--amber); }
  .field input[type=range] {
    width: 100%;
    accent-color: var(--amber);
  }
  .field input[type=number] {
    width: 100%;
    background: var(--panel-raised);
    border: 1px solid var(--grid-major);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 6px 8px;
    border-radius: 4px;
    color-scheme: dark;
  }
  .field input[type=number]::-webkit-inner-spin-button,
  .field input[type=number]::-webkit-outer-spin-button {
    opacity: 1;
    filter: invert(78%) sepia(60%) saturate(600%) hue-rotate(2deg) brightness(1.05);
    cursor: pointer;
    transform: scale(1.25);
    margin-left: 4px;
  }
  .field textarea {
    width: 100%;
    background: var(--panel-raised);
    border: 1px solid var(--grid-major);
    color: var(--cyan);
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px;
    border-radius: 4px;
    resize: vertical;
    min-height: 64px;
    line-height: 1.5;
  }
  .field textarea:focus, .field input:focus {
    outline: none;
    border-color: var(--amber-dim);
  }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .presets { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .presets button {
    background: var(--panel-raised);
    border: 1px solid var(--grid-major);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 9px;
    border-radius: 4px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .presets button:hover { border-color: var(--cyan-dim); color: var(--cyan); }

  #errBox {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--red);
    margin-top: 8px;
    min-height: 14px;
  }

  .legend { display: flex; gap: 18px; margin-bottom: 10px; font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .swatch { width: 14px; height: 3px; border-radius: 2px; display: inline-block; }

  canvas { width: 100%; display: block; border-radius: 4px; }

  footer {
    margin-top: 14px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
  }
  footer code { color: var(--cyan); }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>First-Order <span>ODE</span> Simulator</h1>
    <div class="eqn">&tau; &middot; dy/dt&nbsp;+&nbsp;y&nbsp;=&nbsp;f(t)</div>
  </header>

  <div class="layout">

    <!-- CONTROLS -->
    <div class="panel">

      <div class="field">
        <label><span>Time constant <span style="text-transform: none;">&tau;</span></span> <span><span class="val" id="tauVal">1.00</span> s</span></label>
        <input type="range" id="tau" min="-2" max="2" step="0.01" value="0">
      </div>

      <div class="field">
        <label>Initial condition y(0) <span class="val" id="y0Val">0.00</span></label>
        <input type="range" id="y0" min="-5" max="5" step="0.1" value="0">
      </div>

      <div class="field">
        <label>Y-axis range
          <span class="val" style="font-weight:400;">
            <input type="checkbox" id="yAuto" checked style="vertical-align:middle; accent-color: var(--amber); margin-right:4px;">
            <label for="yAuto" style="text-transform:none; letter-spacing:normal; color:var(--muted); font-family:var(--sans); font-size:12px;">auto</label>
          </span>
        </label>
        <div class="row2">
          <input type="number" id="yMin" placeholder="min" step="0.1">
          <input type="number" id="yMax" placeholder="max" step="0.1">
        </div>
      </div>

      <div class="field row2">
        <div>
          <label>Sim length (s)</label>
          <input type="number" id="tEnd" value="10" step="1" min="0.1">
        </div>
        <div>
          <label>Step dt (s)</label>
          <input type="number" id="dt" value="0.01" step="0.005" min="0.0001">
        </div>
      </div>

      <div class="field">
        <label>Forcing function <span style="text-transform: none;">f(t)</span> &mdash; JS expression</label>
        <textarea id="uExpr" spellcheck="false">t >= 1 ? 1 : 0</textarea>
        <div class="presets" id="presets"></div>
        <div id="errBox"></div>
      </div>

    </div>

    <!-- PLOT -->
    <div class="panel">
      <div class="legend">
        <span><span class="swatch" style="background:var(--cyan)"></span> f(t) &mdash; forcing function</span>
        <span><span class="swatch" style="background:var(--amber)"></span> y(t) &mdash; system response</span>
      </div>
      <canvas id="plot" width="1600" height="640"></canvas>
      <footer>
        Model: <code>&tau; &middot; dy/dt + y = f(t)</code>, integrated with 4th-order Runge&ndash;Kutta.
        Edit f(t) as any JS expression in variable <code>t</code> (e.g. <code>Math.sin(2*Math.PI*0.5*t)</code>).
        Drag sliders or edit fields &mdash; the plot updates live.
      </footer>
    </div>

  </div>
</div>

<script>
(function(){
  const tauSlider = document.getElementById('tau');
  const tauVal = document.getElementById('tauVal');
  const y0Slider = document.getElementById('y0');
  const y0Val = document.getElementById('y0Val');
  const yMinInput = document.getElementById('yMin');
  const yMaxInput = document.getElementById('yMax');
  const yAutoCheckbox = document.getElementById('yAuto');
  const tEndInput = document.getElementById('tEnd');
  const dtInput = document.getElementById('dt');
  const uExprInput = document.getElementById('uExpr');
  const errBox = document.getElementById('errBox');
  const canvas = document.getElementById('plot');
  const ctx = canvas.getContext('2d');

  let lastResult = null; // cache of {ts, ys, us, tau, y0} for range-only redraws
  let lastAutoRange = null; // {min, max} computed from the data, kept for the "auto" toggle

  function getManualRange(){
    if (yAutoCheckbox.checked) return null;
    const lo = parseFloat(yMinInput.value);
    const hi = parseFloat(yMaxInput.value);
    if (!isFinite(lo) || !isFinite(hi) || lo >= hi) return null;
    return { min: lo, max: hi };
  }

  const presets = [
    { label: 'Step', expr: 't >= 1 ? 1 : 0' },
    { label: 'Impulse-ish', expr: 't >= 1 && t < 1.05 ? 20 : 0' },
    { label: 'Rectangular pulse', expr: 't >= 1 && t < 2 ? 1 : 0' },
    { label: 'Ramp', expr: 'Math.min(Math.max(0, t - 1), 2)' },
    { label: 'Sine', expr: 'Math.sin(2*Math.PI*0.5*t)' },
    { label: 'Square wave', expr: 'Math.sign(Math.sin(2*Math.PI*0.3*t))' },
    { label: 'Triangle wave', expr: '2*Math.abs(2*((0.3*t)-Math.floor(0.3*t+0.5)))-1' },
    { label: 'Sawtooth wave', expr: '2*((0.3*t)-Math.floor(0.3*t+0.5))' },
    { label: 'Decaying', expr: 'Math.exp(-0.3*t) * Math.cos(2*Math.PI*t)' },
  ];
  const presetWrap = document.getElementById('presets');
  presets.forEach(p => {
    const b = document.createElement('button');
    b.textContent = p.label;
    b.addEventListener('click', () => { uExprInput.value = p.expr; simulate(); });
    presetWrap.appendChild(b);
  });

  // tau slider is log-scaled: value in [-2,2] maps to tau in [0.01, 100]
  function tauFromSlider(v){ return Math.pow(10, v); }

  function buildUFunction(expr){
    // eslint-disable-next-line no-new-func
    return new Function('t', 'return (' + expr + ');');
  }

  function simulate(){
    errBox.textContent = '';
    const tau = tauFromSlider(parseFloat(tauSlider.value));
    const y0 = parseFloat(y0Slider.value);
    const tEnd = Math.max(parseFloat(tEndInput.value) || 10, dtParsed());
    const dt = dtParsed();
    tauVal.textContent = tau.toFixed(tau < 1 ? 3 : 2);
    y0Val.textContent = y0.toFixed(2);

    let uFunc;
    try {
      uFunc = buildUFunction(uExprInput.value);
      uFunc(0); // test evaluate
    } catch (e) {
      errBox.textContent = 'f(t) error: ' + e.message;
      return;
    }

    const deriv = (t, y) => (uFunc(t) - y) / tau;

    const n = Math.max(2, Math.floor(tEnd / dt));
    const ts = new Array(n + 1);
    const ys = new Array(n + 1);
    const us = new Array(n + 1);
    let t = 0, y = y0;
    ts[0] = t; ys[0] = y; us[0] = safeU(uFunc, t);

    let hadError = false;
    for (let i = 0; i < n; i++){
      try {
        const k1 = deriv(t, y);
        const k2 = deriv(t + dt/2, y + dt/2*k1);
        const k3 = deriv(t + dt/2, y + dt/2*k2);
        const k4 = deriv(t + dt, y + dt*k3);
        y = y + (dt/6)*(k1 + 2*k2 + 2*k3 + k4);
        t = t + dt;
      } catch(e) {
        hadError = true;
      }
      ts[i+1] = t;
      ys[i+1] = y;
      us[i+1] = safeU(uFunc, t);
    }
    if (hadError) errBox.textContent = 'f(t) threw an error during integration at some t; check the expression.';

    lastResult = { ts, ys, us, tau, y0 };
    draw(ts, ys, us, tau, y0, getManualRange());
  }

  function redraw(){
    if (!lastResult) return;
    draw(lastResult.ts, lastResult.ys, lastResult.us, lastResult.tau, lastResult.y0, getManualRange());
  }

  // when "auto" is re-checked, drop back to the data-driven range
  yAutoCheckbox.addEventListener('change', () => {
    if (yAutoCheckbox.checked){
      redraw();
    } else if (lastAutoRange && !yMinInput.value && !yMaxInput.value){
      // seed the fields with the current auto range so the user has a starting point to edit
      yMinInput.value = lastAutoRange.min.toFixed(2);
      yMaxInput.value = lastAutoRange.max.toFixed(2);
      redraw();
    }
  });
  [yMinInput, yMaxInput].forEach(el => el.addEventListener('input', () => {
    if (yAutoCheckbox.checked) yAutoCheckbox.checked = false;
    redraw();
  }));

  function safeU(uFunc, t){
    try { const v = uFunc(t); return (typeof v === 'number' && isFinite(v)) ? v : 0; }
    catch(e){ return 0; }
  }

  function dtParsed(){
    let d = parseFloat(dtInput.value);
    if (!d || d <= 0) d = 0.01;
    return d;
  }

  function draw(ts, ys, us, tau, y0, manualRange){
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    const padL = 60, padR = 24, padT = 24, padB = 40;
    const plotW = W - padL - padR;
    const plotH = H - padT - padB;

    const tMin = ts[0], tMax = ts[ts.length - 1];
    let yMin = Infinity, yMax = -Infinity;
    for (let i = 0; i < ys.length; i++){
      yMin = Math.min(yMin, ys[i], us[i]);
      yMax = Math.max(yMax, ys[i], us[i]);
    }
    if (yMin === yMax){ yMin -= 1; yMax += 1; }
    const pad = (yMax - yMin) * 0.12 || 1;
    yMin -= pad; yMax += pad;

    // cache the auto-computed range so the "auto" checkbox can seed manual fields with it
    lastAutoRange = { min: yMin, max: yMax };

    if (manualRange){
      yMin = manualRange.min;
      yMax = manualRange.max;
    }

    const xOf = t => padL + (t - tMin) / (tMax - tMin) * plotW;
    const yOf = v => padT + plotH - (v - yMin) / (yMax - yMin) * plotH;

    // background grid
    ctx.strokeStyle = '#1C2530';
    ctx.lineWidth = 1;
    const nXGrid = 10, nYGrid = 8;
    ctx.font = '20px ui-monospace, monospace';
    ctx.fillStyle = '#7C8896';

    for (let i = 0; i <= nXGrid; i++){
      const t = tMin + (tMax - tMin) * i / nXGrid;
      const x = xOf(t);
      ctx.beginPath();
      ctx.moveTo(x, padT);
      ctx.lineTo(x, padT + plotH);
      ctx.stroke();
      ctx.fillText(t.toFixed(1), x - 12, padT + plotH + 26);
    }
    for (let i = 0; i <= nYGrid; i++){
      const v = yMin + (yMax - yMin) * i / nYGrid;
      const y = yOf(v);
      ctx.beginPath();
      ctx.moveTo(padL, y);
      ctx.lineTo(padL + plotW, y);
      ctx.stroke();
      ctx.fillText(v.toFixed(2), 4, y + 5);
    }

    // zero line emphasis
    if (yMin < 0 && yMax > 0){
      ctx.strokeStyle = '#2A3542';
      ctx.lineWidth = 1.5;
      const y = yOf(0);
      ctx.beginPath();
      ctx.moveTo(padL, y);
      ctx.lineTo(padL + plotW, y);
      ctx.stroke();
    }

    // axes box
    ctx.strokeStyle = '#2A3542';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(padL, padT, plotW, plotH);

    // clip traces to the axes box so zooming in doesn't draw outside it
    ctx.save();
    ctx.beginPath();
    ctx.rect(padL, padT, plotW, plotH);
    ctx.clip();

    // draw f(t)
    drawTrace(us, ts, xOf, yOf, '#4FD8E8', 2.5);
    // draw y(t) with glow
    drawTrace(ys, ts, xOf, yOf, '#FFB020', 3.2, true);

    // marker at t=0 for y0
    ctx.fillStyle = '#FFB020';
    ctx.beginPath();
    ctx.arc(xOf(ts[0]), yOf(y0), 5, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();
  }

  function drawTrace(vals, ts, xOf, yOf, color, width, glow){
    ctx.save();
    if (glow){
      ctx.shadowColor = color;
      ctx.shadowBlur = 8;
    }
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.beginPath();
    // decimate to keep drawing fast if huge number of points
    const n = vals.length;
    const step = Math.max(1, Math.floor(n / 4000));
    for (let i = 0; i < n; i += step){
      const x = xOf(ts[i]), y = yOf(vals[i]);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.restore();
  }

  // wire up events
  [tauSlider, y0Slider].forEach(el => el.addEventListener('input', simulate));
  [tEndInput, dtInput].forEach(el => el.addEventListener('change', simulate));
  uExprInput.addEventListener('input', debounce(simulate, 250));


  function debounce(fn, ms){
    let h;
    return function(...args){
      clearTimeout(h);
      h = setTimeout(() => fn.apply(this, args), ms);
    };
  }

  // set default tau slider to represent tau=1 -> slider value 0
  tauSlider.value = 0;
  simulate();

  window.addEventListener('resize', () => {}); // canvas is fixed internal resolution, scales via CSS width:100%
})();
</script>
</body>
</html>
